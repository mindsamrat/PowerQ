<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D6294A"/>
      <stop offset="1" stop-color="#9F1024"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <rect width="64" height="64" rx="12" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
  <!-- 4-axis compass rose: each elongated arm represents one axis of power -->
  <path d="M32 7 L34.5 30 L57 32 L34.5 34 L32 57 L29.5 34 L7 32 L29.5 30 Z" fill="#FFFFFF" fill-opacity="0.96"/>
  <!-- secondary diagonal arms for depth -->
  <path d="M48.7 15.3 L34.4 29.6 L48.7 48.7 L34.4 34.4 L15.3 48.7 L29.6 34.4 L15.3 15.3 L29.6 29.6 Z" fill="#FFFFFF" fill-opacity="0.35"/>
  <!-- center node -->
  <circle cx="32" cy="32" r="3" fill="#9F1024"/>
  <circle cx="32" cy="32" r="1.4" fill="#FFFFFF"/>
</svg>
